name: CI Security Gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Dependency audit — fail on moderate+ vulnerabilities
  # ---------------------------------------------------------------------------
  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit (fail on moderate+)
        run: npm audit --audit-level=moderate

  # ---------------------------------------------------------------------------
  # 2. Secret scan — detect secrets in commit history
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base/head for TruffleHog
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          # Fallback para casos raros (ex.: before vazio/zeros)
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || true)"
          fi

          echo "TH_BASE=$BASE" >> "$GITHUB_ENV"
          echo "TH_HEAD=$HEAD" >> "$GITHUB_ENV"
          echo "TruffleHog base=$BASE head=$HEAD"

      - name: Skip TruffleHog when base=head
        if: ${{ env.TH_BASE == env.TH_HEAD || env.TH_BASE == '' || env.TH_HEAD == '' }}
        run: |
          echo "Skipping TruffleHog: base/head invalid or identical"

      - name: TruffleHog OSS
        if: ${{ env.TH_BASE != env.TH_HEAD && env.TH_BASE != '' && env.TH_HEAD != '' }}
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ env.TH_BASE }}
          head: ${{ env.TH_HEAD }}
          extra_args: --debug --only-verified

  # ---------------------------------------------------------------------------
  # 3. Lint + TypeScript typecheck
  # ---------------------------------------------------------------------------
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint (with security plugin)
        run: npm run lint
      - name: TypeScript typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # 4. Unit + security tests (no DB required)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit + Security Tests
    runs-on: ubuntu-latest
    env:
      # Minimal env vars needed for lib/env.ts to pass boot validation in tests
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: prospeccao_test
      DB_USER: test_user
      DB_PASSWORD: testpassword
      OPENROUTER_API_KEY: sk-or-test-placeholder-for-unit-tests-only
      OPENROUTER_MODEL: anthropic/claude-3.5-sonnet
      NODE_ENV: test
      # 64 hex chars = 32 bytes AES key — test placeholder only, never production
      CREDENTIALS_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      # S3 / media pipeline — test placeholders only; MSW mocks actual calls
      MEDIA_STORAGE_ENABLED: 'true'
      S3_BUCKET: test-bucket
      S3_ACCESS_KEY_ID: test-key-id
      S3_SECRET_ACCESS_KEY: test-secret-key
      S3_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run unit + security tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 5. Integration tests (requires PostgreSQL service container)
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: prospeccao_test
          POSTGRES_USER: prospeccao_app
          POSTGRES_PASSWORD: testpassword_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: prospeccao_test
      DB_USER: prospeccao_app
      DB_PASSWORD: testpassword_ci
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY_TEST }}
      OPENROUTER_MODEL: anthropic/claude-3.5-sonnet
      NODE_ENV: test
      # 64 hex chars = 32 bytes AES key — test placeholder only, never production
      CREDENTIALS_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      # S3 / media pipeline — test placeholders; MSW mocks actual S3 calls
      S3_BUCKET: test-bucket
      S3_ACCESS_KEY_ID: test-key-id
      S3_SECRET_ACCESS_KEY: test-secret-key
      S3_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
      - name: Create schema and seed test data
        run: |
          PGPASSWORD=testpassword_ci psql -h localhost -U prospeccao_app -d prospeccao_test <<'SQL'
            CREATE TABLE IF NOT EXISTS estabelecimentos (
              cnpj_completo       VARCHAR(14) PRIMARY KEY,
              razao_social        TEXT NOT NULL,
              nome_fantasia       TEXT,
              uf                  CHAR(2) NOT NULL,
              municipio           TEXT NOT NULL,
              cnae_principal      VARCHAR(20),
              situacao_cadastral  VARCHAR(20) NOT NULL DEFAULT 'ATIVA',
              telefone1           VARCHAR(30),
              telefone2           VARCHAR(30),
              correio_eletronico  VARCHAR(115)
            );

            INSERT INTO estabelecimentos
              (cnpj_completo, razao_social, nome_fantasia, uf, municipio, cnae_principal,
               situacao_cadastral, telefone1, telefone2, correio_eletronico)
            VALUES
              ('11222333000181','CLINICA ODONTO LTDA','Odonto SP','SP','SAO PAULO',
               '8630-5/04','ATIVA','11999990000',NULL,'contato@odonto.com'),
              ('22333444000192','RESTAURANTE BOM SABOR EIRELI',NULL,'RJ','RIO DE JANEIRO',
               '5611-2/01','ATIVA','21988887777',NULL,NULL)
            ON CONFLICT DO NOTHING;

            -- WhatsApp channel management tables (migrations/001 + 002)
            CREATE TABLE IF NOT EXISTS whatsapp_channels (
              id                     UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              workspace_id           TEXT NOT NULL,
              name                   TEXT NOT NULL,
              provider               TEXT NOT NULL CHECK (provider IN ('META_CLOUD','EVOLUTION','UAZAPI')),
              status                 TEXT NOT NULL DEFAULT 'DISCONNECTED'
                                       CHECK (status IN ('DISCONNECTED','PENDING_QR','CONNECTING','CONNECTED','ERROR')),
              phone_number           TEXT,
              external_instance_id   TEXT,
              credentials_encrypted  TEXT NOT NULL,
              webhook_secret         TEXT NOT NULL,
              last_seen_at           TIMESTAMPTZ,
              created_at             TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at             TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );

            CREATE INDEX IF NOT EXISTS idx_whatsapp_channels_workspace ON whatsapp_channels(workspace_id);
            CREATE INDEX IF NOT EXISTS idx_whatsapp_channels_status ON whatsapp_channels(status);

            CREATE OR REPLACE FUNCTION update_updated_at_column()
            RETURNS TRIGGER AS $$
            BEGIN NEW.updated_at = NOW(); RETURN NEW; END;
            $$ language 'plpgsql';

            DROP TRIGGER IF EXISTS update_whatsapp_channels_updated_at ON whatsapp_channels;
            CREATE TRIGGER update_whatsapp_channels_updated_at
              BEFORE UPDATE ON whatsapp_channels
              FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

            CREATE TABLE IF NOT EXISTS webhook_events (
              id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              provider     TEXT NOT NULL,
              event_id     TEXT NOT NULL,
              channel_id   UUID NOT NULL REFERENCES whatsapp_channels(id) ON DELETE CASCADE,
              received_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              UNIQUE (provider, event_id)
            );

            CREATE INDEX IF NOT EXISTS idx_webhook_events_lookup ON webhook_events(provider, event_id);

            -- Migration 003: workspace_api_keys
            CREATE TABLE IF NOT EXISTS workspace_api_keys (
              id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              workspace_id TEXT NOT NULL,
              key_hash     TEXT NOT NULL UNIQUE,
              label        TEXT NOT NULL,
              created_by   TEXT,
              revoked_at   TIMESTAMPTZ,
              last_used_at TIMESTAMPTZ,
              created_at   TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_workspace_api_keys_hash
              ON workspace_api_keys(key_hash) WHERE revoked_at IS NULL;
            CREATE INDEX IF NOT EXISTS idx_workspace_api_keys_workspace
              ON workspace_api_keys(workspace_id) WHERE revoked_at IS NULL;

            -- Migration 004: conversations
            CREATE TABLE IF NOT EXISTS conversations (
              id              UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              channel_id      UUID NOT NULL REFERENCES whatsapp_channels(id) ON DELETE CASCADE,
              workspace_id    TEXT NOT NULL,
              contact_phone   TEXT NOT NULL,
              contact_name    TEXT,
              status          TEXT NOT NULL DEFAULT 'open'
                                CHECK (status IN ('open','resolved','ai_handled')),
              last_message_at TIMESTAMPTZ,
              unread_count    INTEGER NOT NULL DEFAULT 0,
              ai_enabled      BOOLEAN NOT NULL DEFAULT false,
              created_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at      TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              UNIQUE (channel_id, contact_phone)
            );
            CREATE INDEX IF NOT EXISTS idx_conversations_workspace
              ON conversations(workspace_id, status);
            CREATE INDEX IF NOT EXISTS idx_conversations_channel
              ON conversations(channel_id);
            DROP TRIGGER IF EXISTS trg_conversations_updated_at ON conversations;
            CREATE TRIGGER trg_conversations_updated_at
              BEFORE UPDATE ON conversations
              FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

            -- Migration 005: messages
            CREATE TABLE IF NOT EXISTS messages (
              id                  UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              conversation_id     UUID NOT NULL REFERENCES conversations(id) ON DELETE CASCADE,
              channel_id          UUID NOT NULL REFERENCES whatsapp_channels(id) ON DELETE CASCADE,
              provider_message_id TEXT,
              direction           TEXT NOT NULL CHECK (direction IN ('inbound','outbound')),
              message_type        TEXT NOT NULL
                CHECK (message_type IN ('text','image','audio','video','document','sticker','reaction')),
              status              TEXT NOT NULL DEFAULT 'queued'
                CHECK (status IN ('queued','sent','delivered','read','failed')),
              body                TEXT,
              media_s3_key        TEXT,
              media_mime_type     TEXT,
              media_filename      TEXT,
              media_size_bytes    BIGINT,
              reaction_to_msg_id  UUID REFERENCES messages(id),
              sent_by             TEXT,
              ai_decision_log     JSONB,
              raw_event           JSONB,
              created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_messages_conversation
              ON messages(conversation_id, created_at DESC);
            CREATE INDEX IF NOT EXISTS idx_messages_provider_id
              ON messages(channel_id, provider_message_id);
            CREATE INDEX IF NOT EXISTS idx_messages_retention ON messages(created_at);
            DROP TRIGGER IF EXISTS trg_messages_updated_at ON messages;
            CREATE TRIGGER trg_messages_updated_at
              BEFORE UPDATE ON messages
              FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

            -- Migration 006: audit_log
            CREATE TABLE IF NOT EXISTS audit_log (
              id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              workspace_id  TEXT NOT NULL,
              actor         TEXT NOT NULL,
              action        TEXT NOT NULL,
              resource_type TEXT,
              resource_id   TEXT,
              meta          JSONB,
              ip            TEXT,
              created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_audit_log_workspace
              ON audit_log(workspace_id, created_at DESC);

            -- Migration 007: LGPD retention markers
            COMMENT ON TABLE messages IS
              'LGPD Art. 15 — dados de mensagens retidos por 365 dias.';
            COMMENT ON TABLE audit_log IS
              'LGPD Art. 37 — registros de operações retidos por 730 dias.';
            CREATE INDEX IF NOT EXISTS idx_audit_log_retention ON audit_log(created_at);

            -- Migration 008: campaigns
            CREATE TABLE IF NOT EXISTS campaigns (
              id                  UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              workspace_id        TEXT NOT NULL,
              name                TEXT,
              status              TEXT NOT NULL DEFAULT 'draft'
                                    CHECK (status IN (
                                      'draft','awaiting_confirmation','awaiting_channel',
                                      'awaiting_message','ready_to_send','sending','paused',
                                      'completed','completed_with_errors','cancelled')),
              channel_id          UUID REFERENCES whatsapp_channels(id) ON DELETE SET NULL,
              message_type        TEXT CHECK (message_type IN ('template','text')),
              message_content     JSONB,
              search_filters      JSONB,
              total_count         INT NOT NULL DEFAULT 0 CHECK (total_count >= 0),
              sent_count          INT NOT NULL DEFAULT 0 CHECK (sent_count >= 0),
              failed_count        INT NOT NULL DEFAULT 0 CHECK (failed_count >= 0),
              confirmation_token  TEXT,
              created_by          TEXT NOT NULL,
              automation_delay_seconds       INTEGER NOT NULL DEFAULT 120
                CHECK (automation_delay_seconds >= 10 AND automation_delay_seconds <= 86400),
              automation_jitter_max          INTEGER NOT NULL DEFAULT 20
                CHECK (automation_jitter_max >= 0 AND automation_jitter_max <= 300),
              automation_max_per_hour        INTEGER NOT NULL DEFAULT 30
                CHECK (automation_max_per_hour >= 1 AND automation_max_per_hour <= 500),
              automation_working_hours_start SMALLINT
                CHECK (automation_working_hours_start BETWEEN 0 AND 23),
              automation_working_hours_end   SMALLINT
                CHECK (automation_working_hours_end   BETWEEN 0 AND 23),
              max_retries                    INTEGER NOT NULL DEFAULT 3
                CHECK (max_retries >= 0 AND max_retries <= 10),
              next_send_at                   TIMESTAMPTZ,
              paused_at                      TIMESTAMPTZ,
              created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at          TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_campaigns_workspace
              ON campaigns(workspace_id, created_at DESC);
            CREATE INDEX IF NOT EXISTS idx_campaigns_active
              ON campaigns(workspace_id, status)
              WHERE status NOT IN ('completed','completed_with_errors','cancelled');
            CREATE INDEX IF NOT EXISTS idx_campaigns_sendable
              ON campaigns(next_send_at, status) WHERE status = 'sending';
            DROP TRIGGER IF EXISTS trg_campaigns_updated_at ON campaigns;
            CREATE TRIGGER trg_campaigns_updated_at
              BEFORE UPDATE ON campaigns
              FOR EACH ROW EXECUTE FUNCTION update_updated_at_column();

            CREATE TABLE IF NOT EXISTS campaign_recipients (
              id                   UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              campaign_id          UUID NOT NULL REFERENCES campaigns(id) ON DELETE CASCADE,
              cnpj                 TEXT NOT NULL,
              razao_social         TEXT,
              nome_fantasia        TEXT,
              telefone             TEXT,
              email                TEXT,
              municipio            TEXT,
              uf                   TEXT,
              status               TEXT NOT NULL DEFAULT 'pending'
                                     CHECK (status IN ('pending','processing','sent','failed','skipped')),
              provider_message_id  TEXT,
              error_message        TEXT,
              sent_at              TIMESTAMPTZ,
              retry_count          INTEGER NOT NULL DEFAULT 0 CHECK (retry_count >= 0),
              next_retry_at        TIMESTAMPTZ,
              processing_started_at TIMESTAMPTZ,
              created_at           TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_campaign_recipients_campaign
              ON campaign_recipients(campaign_id, status);
            CREATE UNIQUE INDEX IF NOT EXISTS idx_campaign_recipients_unique
              ON campaign_recipients(campaign_id, cnpj);
            CREATE INDEX IF NOT EXISTS idx_campaign_recipients_stuck
              ON campaign_recipients(campaign_id, processing_started_at)
              WHERE status = 'processing';
            CREATE INDEX IF NOT EXISTS idx_campaign_recipients_retry
              ON campaign_recipients(campaign_id, next_retry_at)
              WHERE status = 'pending' AND next_retry_at IS NOT NULL;

            CREATE TABLE IF NOT EXISTS campaign_audit_log (
              id           UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              campaign_id  UUID NOT NULL REFERENCES campaigns(id) ON DELETE CASCADE,
              action       TEXT NOT NULL,
              performed_by TEXT NOT NULL,
              metadata     JSONB,
              created_at   TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_campaign_audit_campaign
              ON campaign_audit_log(campaign_id, created_at DESC);

            -- Migration 011: CNAE dictionary
            CREATE TABLE IF NOT EXISTS cnae_dictionary (
              codigo    TEXT PRIMARY KEY,
              descricao TEXT NOT NULL,
              sinonimos TEXT[] NOT NULL DEFAULT '{}'
            );
            CREATE INDEX IF NOT EXISTS idx_cnae_dictionary_sinonimos
              ON cnae_dictionary USING GIN (sinonimos);
            INSERT INTO cnae_dictionary (codigo, descricao, sinonimos) VALUES
              ('8630-5/04','Atividades Odontologicas',ARRAY['clinicas odontologicas','dentistas','odontologia']),
              ('8630-5/01','Atividades de Atencao Ambulatorial Executadas por Medicos',ARRAY['clinicas medicas','medicos']),
              ('8610-1/01','Atividades de Atencao a Saude Humana',ARRAY['hospitais']),
              ('5611-2/01','Restaurantes e Similares',ARRAY['restaurantes','pizzarias','delivery']),
              ('6201-5/01','Desenvolvimento de Programas de Computador',ARRAY['software','startups'])
            ON CONFLICT (codigo) DO UPDATE SET descricao = EXCLUDED.descricao, sinonimos = EXCLUDED.sinonimos;

            -- Migration 012: users
            CREATE TABLE IF NOT EXISTS users (
              id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              workspace_id  TEXT NOT NULL,
              email         TEXT NOT NULL UNIQUE,
              password_hash TEXT NOT NULL,
              created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);

            -- Migration 013: web_sessions
            CREATE TABLE IF NOT EXISTS web_sessions (
              id                  UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              user_id             UUID NOT NULL REFERENCES users(id) ON DELETE CASCADE,
              workspace_id        TEXT NOT NULL,
              session_token_hash  TEXT NOT NULL UNIQUE,
              expires_at          TIMESTAMPTZ NOT NULL,
              created_at          TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE INDEX IF NOT EXISTS idx_web_sessions_expires_at ON web_sessions(expires_at);

            -- Migration 015: llm_profiles
            CREATE TABLE IF NOT EXISTS llm_profiles (
              id                UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
              workspace_id      TEXT        NOT NULL,
              name              TEXT        NOT NULL,
              provider          TEXT        NOT NULL
                CHECK (provider IN ('openrouter','openai','anthropic','google')),
              api_key_encrypted TEXT        NOT NULL,
              model             TEXT        NOT NULL,
              base_url          TEXT,
              is_default        BOOLEAN     NOT NULL DEFAULT false,
              created_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              updated_at        TIMESTAMPTZ NOT NULL DEFAULT NOW()
            );
            CREATE UNIQUE INDEX IF NOT EXISTS llm_profiles_workspace_name_idx
              ON llm_profiles(workspace_id, name);
            CREATE UNIQUE INDEX IF NOT EXISTS llm_profiles_workspace_default_idx
              ON llm_profiles(workspace_id) WHERE is_default = true;
            CREATE INDEX IF NOT EXISTS llm_profiles_workspace_id_idx
              ON llm_profiles(workspace_id);
            CREATE OR REPLACE FUNCTION set_llm_profiles_updated_at()
            RETURNS TRIGGER LANGUAGE plpgsql AS $$
            BEGIN NEW.updated_at = NOW(); RETURN NEW; END;
            $$;
            DROP TRIGGER IF EXISTS trg_llm_profiles_updated_at ON llm_profiles;
            CREATE TRIGGER trg_llm_profiles_updated_at
              BEFORE UPDATE ON llm_profiles
              FOR EACH ROW EXECUTE FUNCTION set_llm_profiles_updated_at();

            -- Migration 016: agent_served_leads
            -- Migration 017: actor_id (combined into one CREATE to avoid ALTER complexity)
            CREATE TABLE IF NOT EXISTS agent_served_leads (
              id                UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
              workspace_id      TEXT        NOT NULL,
              actor_id          TEXT        NOT NULL DEFAULT '',
              query_fingerprint TEXT        NOT NULL,
              cnpj              TEXT        NOT NULL,
              served_at         TIMESTAMPTZ NOT NULL DEFAULT NOW(),
              UNIQUE (workspace_id, actor_id, query_fingerprint, cnpj)
            );
            CREATE INDEX IF NOT EXISTS agent_served_leads_lookup_idx
              ON agent_served_leads(workspace_id, actor_id, query_fingerprint, served_at);
            CREATE INDEX IF NOT EXISTS agent_served_leads_served_at_idx
              ON agent_served_leads(served_at);
          SQL
      - name: Run integration + contract tests
        run: npm run test:integration
